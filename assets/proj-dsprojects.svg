<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f12"/>
      <stop offset="1" stop-color="#101a1f"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#4ea834"/>
      <stop offset="1" stop-color="#6dcb4e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg2)"/>
  <circle cx="90" cy="440" r="200" fill="#6dcb4e" opacity="0.05"/>
  <!-- axes -->
  <g stroke="#22302a" stroke-width="2">
    <line x1="110" y1="70" x2="110" y2="410"/>
    <line x1="110" y1="410" x2="720" y2="410"/>
  </g>
  <g stroke="#161d21" stroke-width="1">
    <line x1="110" y1="150" x2="720" y2="150"/>
    <line x1="110" y1="235" x2="720" y2="235"/>
    <line x1="110" y1="320" x2="720" y2="320"/>
  </g>
  <!-- scatter -->
  <g fill="#3f5a49">
    <circle cx="170" cy="360" r="9"/><circle cx="235" cy="330" r="9"/><circle cx="285" cy="352" r="9"/>
    <circle cx="345" cy="290" r="9"/><circle cx="400" cy="305" r="9"/><circle cx="455" cy="240" r="9"/>
    <circle cx="515" cy="255" r="9"/><circle cx="570" cy="190" r="9"/><circle cx="630" cy="165" r="9"/>
  </g>
  <g fill="#6dcb4e">
    <circle cx="205" cy="345" r="9"/><circle cx="310" cy="300" r="9"/><circle cx="430" cy="265" r="9"/>
    <circle cx="545" cy="215" r="9"/><circle cx="665" cy="130" r="9"/>
  </g>
  <!-- trend line -->
  <path d="M130 385 C 300 340, 480 260, 700 110" fill="none" stroke="url(#line)" stroke-width="6" stroke-linecap="round" stroke-dasharray="640">
    <animate attributeName="stroke-dashoffset" from="640" to="0" dur="2.4s" fill="freeze"/>
  </path>
  <text x="110" y="470" font-family="monospace" font-size="24" fill="#5c6a63">model.fit(X_train, y_train)  ·  r² = 0.94</text>
</svg>
