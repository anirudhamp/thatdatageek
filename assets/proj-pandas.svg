<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f12"/>
      <stop offset="1" stop-color="#131c16"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="700" cy="60" r="180" fill="#6dcb4e" opacity="0.06"/>
  <text x="60" y="86" font-family="monospace" font-size="26" fill="#6dcb4e">import pandas as pd</text>
  <text x="60" y="124" font-family="monospace" font-size="26" fill="#5c6a63">df = pd.read_csv("data.csv")</text>
  <!-- dataframe -->
  <g transform="translate(60,170)">
    <rect x="0" y="0" width="560" height="52" rx="8" fill="#6dcb4e"/>
    <text x="24" y="34" font-family="monospace" font-size="22" fill="#0b0f12">id</text>
    <text x="160" y="34" font-family="monospace" font-size="22" fill="#0b0f12">name</text>
    <text x="320" y="34" font-family="monospace" font-size="22" fill="#0b0f12">value</text>
    <text x="470" y="34" font-family="monospace" font-size="22" fill="#0b0f12">flag</text>
    <g fill="#161d21" stroke="#22302a" stroke-width="1">
      <rect x="0" y="60"  width="560" height="46" rx="8"/>
      <rect x="0" y="114" width="560" height="46" rx="8"/>
      <rect x="0" y="168" width="560" height="46" rx="8"/>
    </g>
    <g font-family="monospace" font-size="20" fill="#9db3a6">
      <text x="24" y="90">01</text><text x="160" y="90">alpha</text><text x="320" y="90">42.7</text><text x="470" y="90">True</text>
      <text x="24" y="144">02</text><text x="160" y="144">beta</text><text x="320" y="144">17.3</text><text x="470" y="144">False</text>
      <text x="24" y="198">03</text><text x="160" y="198">gamma</text><text x="320" y="198">88.1</text><text x="470" y="198">True</text>
    </g>
  </g>
  <text x="60" y="452" font-family="monospace" font-size="24" fill="#5c6a63">&gt;&gt;&gt; df.describe()</text>
  <rect x="286" y="432" width="14" height="26" fill="#6dcb4e">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
